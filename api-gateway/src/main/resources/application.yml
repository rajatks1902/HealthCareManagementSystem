spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]': # Apply to all routes
            allowedOrigins:
              - http://localhost:9090
              - http://localhost:5173
              - http://127.0.0.1:5173
              - http://localhost:4200
              - http://127.0.0.1:4200
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

  application:
    name: api-gateway

  boot:
    admin:
      client:
        enabled: true
        instance:
          name: api gateway
          service-url: http://gateway-service:8080
        url: http://admin-service:8080
        auto-registration: true

  main:
    web-application-type: reactive

management:
  endpoints:
    web:
      exposure:
        include: "*"
      enable:
        include: health

server:
  port: ${GATEWAY_SERVICE_PORT:8080}

logging:
  level:
    root: INFO
    com.rajat.api.gateway: DEBUG
    org.springframework.cloud.gateway: INFO

jwt:
  secret: ${JWT_SECRET:uRfCVw3dynDxHboOukyMgdvrGlVeE8mo58w6IYqqn6AwdE7P}
